<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>Mock ManageBac Grade Page</title>
    <style>
      body { font-family: sans-serif; margin: 20px; }
      table { border-collapse: collapse; width: 520px; }
      td, th { border: 1px solid #ddd; padding: 8px; }
      input { width: 80px; }
    </style>
  </head>
  <body>
    <h1 class="class-name">高一A班</h1>
    <h2 class="task-title">化学作业 03</h2>

    <div class="gradebook-container">
      <table class="gradebook-table">
        <thead>
          <tr><th>学生</th><th>分数</th></tr>
        </thead>
        <tbody>
          <tr data-student-id="s1"><td class="student-name">王小明</td><td><input class="grade-input" /></td></tr>
          <tr data-student-id="s2"><td class="student-name">李华</td><td><input class="grade-input" /></td></tr>
          <tr data-student-id="s3"><td class="student-name">张三</td><td><input class="grade-input" /></td></tr>
        </tbody>
      </table>
      <button class="save-grades">保存</button>
    </div>
  </body>
</html>
